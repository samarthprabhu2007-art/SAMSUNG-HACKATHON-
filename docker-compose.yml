version: '3.8'

services:
  frontend:
    image: node:22-alpine
    working_dir: /app
    volumes:
      - .:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    environment:
      - HOST=0.0.0.0
    command: sh -c "npm install && npm run dev -- --host"

  backend:
    image: node:22-alpine
    working_dir: /app/backend
    volumes:
      - .:/app
      - /app/backend/node_modules
    ports:
      - "3000:3000"
    env_file:
      - backend/.env
    command: sh -c "npm install && npm run dev"
    depends_on:
      - frontend
